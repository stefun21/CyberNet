<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Clicker Tycoon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <div class="clicker-section">
            <h1>Crypto Miner Tycoon</h1>
            <div class="balance-container">
                <span id="balance">0</span> <span class="currency">ByteCoins</span>
            </div>
            <p id="cps-display">Generare automată: 0 BC/secundă</p>
            
            <div id="clickBox" class="server-box">
                <div class="server-light"></div>
                <span>MINARE MANUALĂ</span>
            </div>
        </div>

        <div class="shop-section">
            <h2>Magazin Upgrade-uri</h2>
            <hr>

            <div class="upgrade-card" id="upgrade-bot">
                <div class="upgrade-info">
                    <h3>Script Automat (Bot)</h3>
                    <p>+1 BC / sec</p>
                    <p class="cost-text">Cost: <span id="bot-cost">15</span> BC</p>
                </div>
                <div class="upgrade-count" id="bot-count">0</div>
            </div>

            <div class="upgrade-card" id="upgrade-gpu">
                <div class="upgrade-info">
                    <h3>Placă Video (GPU)</h3>
                    <p>+10 BC / sec</p>
                    <p class="cost-text">Cost: <span id="gpu-cost">100</span> BC</p>
                </div>
                <div class="upgrade-count" id="gpu-count">0</div>
            </div>

            <div class="upgrade-card" id="upgrade-mainframe">
                <div class="upgrade-info">
                    <h3>Supercomputer</h3>
                    <p>+80 BC / sec</p>
                    <p class="cost-text">Cost: <span id="mainframe-cost">1100</span> BC</p>
                </div>
                <div class="upgrade-count" id="mainframe-count">0</div>
            </div>

            <button id="resetBtn">Resetează Jocul</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
